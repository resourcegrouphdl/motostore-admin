<div class="login-screen">
  <div class="login-card" role="main">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="17.5" r="2.5"/><circle cx="18.5" cy="17.5" r="2.5"/>
          <path d="M8 17.5h7M2 12l2-7h10l2 4h3l2 3-3 1"/>
        </svg>
      </div>
      <span class="brand-name">MotoStore</span>
    </div>

    <!-- Heading -->
    <h1 class="login-heading">Inicia sesión</h1>
    <p class="login-sub">Accede al panel de administración</p>

    <!-- Form -->
    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="login-email">Email</label>
        <div class="field-wrap">
          <input
            id="login-email"
            class="field-input"
            [class.is-error]="form.controls.email.invalid && form.controls.email.touched"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="tu@email.com"
            aria-describedby="email-error"
          />
        </div>
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span id="email-error" class="field-error" role="alert">
            Ingresa un email válido
          </span>
        }
      </div>

      <!-- Contraseña -->
      <div class="field">
        <label class="field-label" for="login-password">Contraseña</label>
        <div class="field-wrap">
          <input
            id="login-password"
            class="field-input has-suffix"
            [class.is-error]="form.controls.password.invalid && form.controls.password.touched"
            [type]="hidePass() ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            aria-describedby="password-error"
          />
          <button
            class="field-suffix"
            type="button"
            (click)="hidePass.set(!hidePass())"
            [attr.aria-label]="hidePass() ? 'Mostrar contraseña' : 'Ocultar contraseña'"
          >
            @if (hidePass()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span id="password-error" class="field-error" role="alert">
            La contraseña es obligatoria
          </span>
        }
      </div>

      <!-- Error global -->
      @if (error()) {
        <div class="alert-error" role="alert">{{ error() }}</div>
      }

      <!-- Submit -->
      <button
        class="btn-submit"
        type="submit"
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          Verificando...
        } @else {
          Ingresar
        }
      </button>

    </form>
  </div>
</div>
